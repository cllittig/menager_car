name: Sistema Veicular CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Qualidade (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, backend]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Prettier (check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run type-check

  test-backend:
    name: Testes (backend)
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET: test-jwt-secret-for-ci-only-32chars-min
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test

  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [quality, test-backend]
    strategy:
      matrix:
        app: [frontend, backend]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3005
      JWT_SECRET: build-time-secret-not-for-production-32ch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - run: npm ci
      - run: npm run build

  security-audit:
    name: npm audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, backend]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - run: npm ci
      # Muitas bases têm alertas transitivos; não bloqueia o restante do CI.
      - name: Auditoria (alto ou crítico)
        run: npm audit --audit-level high
        continue-on-error: true
